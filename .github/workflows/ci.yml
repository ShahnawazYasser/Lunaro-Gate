name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build web
        working-directory: web
        run: npm run build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          DATABASE_URL_UNPOOLED: postgres://ci:ci@localhost:5432/ci
          GATE_DEFAULT_BOOTH_ID: default
          GATE_BASE_PRICE_PKR: '500'
          GATE_ADDITIONAL_COPY_PRICE_PKR: '250'
          GATE_MAX_PRINTS_PER_CODE: '5'
          GATE_CODE_EXPIRY_HOURS: '2'
          GATE_RATE_LIMIT_PER_MIN: '30'
          CRON_SECRET: ci-placeholder-secret-value
