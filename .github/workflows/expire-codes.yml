name: Expire old codes

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Call expire-old endpoint
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.GATE_API_BASE_URL }}/api/codes/expire-old"
